services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       shopstack
      POSTGRES_USER:     shopstack
      POSTGRES_PASSWORD: shopstack_dev
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopstack -d shopstack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  api:
    build: ../services/api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shopstack
      DB_USER: shopstack
      DB_PASS: shopstack_dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - web

  worker:
    build: ../services/worker
    environment:
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  frontend:
    build: ../services/frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - web

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - backend

networks:
  web:
  backend:

volumes:
  db-data:
