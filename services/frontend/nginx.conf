# ShopStack Frontend — Nginx config
# Two jobs:
#   1. Serve static files (index.html) from /usr/share/nginx/html
#   2. Proxy /api/* requests to the Python API container
#
# The proxy_pass is what connects the browser to the API.
# If you change the service name in docker-compose.yml, change it here too.
# That mismatch is Break #4 in BREAK_IT.md.

server {
    listen 80;
    server_name _;

    # Access log in combined format — every browser hit appears here.
    # Watch it live: docker logs shopstack-frontend-1 -f
    # Fields: $remote_addr $request $status $body_bytes_sent $http_referer
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Static files — the store UI
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the Python API
    # The hostname 'api' resolves via Docker DNS — same network, same compose file.
    # Change 'api' to anything wrong and you get 502 Bad Gateway immediately.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        # Pass the real client IP through to the API logs
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Timeout settings — if the API doesn't respond in 10s, nginx returns 504.
        # Hit /api/stress (3s delay) and you will NOT see a timeout — 10s is enough.
        # Change proxy_read_timeout to 2s and then hit /api/stress. You will see 504.
        # That is Break #7 in BREAK_IT.md.
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;
    }

    # Health check endpoint for nginx itself
    # Docker healthcheck and K8s liveness probe can use this
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
